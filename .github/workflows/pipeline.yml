name: World Cup Data Pipeline

on:
  workflow_dispatch:

  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_HOST: v3.football.api-sports.io
      API_FOOTBALL_BASE_URL: https://v3.football.api-sports.io
      WORLD_CUP_LEAGUE_ID: "1"
      WORLD_CUP_SEASON: "2022"

      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/secrets/gcp-sa-key.json
      BQ_DATASET: mci506_worldcup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create service account key file
        run: |
          mkdir -p secrets
          echo '${{ secrets.GCP_SA_KEY }}' > secrets/gcp-sa-key.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API extraction
        run: |
          python -m scripts.extract

      - name: Run local EDA flattening
        run: |
          python -m scripts.eda_local

      - name: Run EDA summaries
        run: |
          python -m scripts.eda_summary

      - name: Upload artifacts to GCS
        run: |
          python -m scripts.load_gcs
      
      - name: Enviar Alerta de Emergencia si el Pipeline Falla
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "**¡ALERTA EN EL PIPELINE!** \n\nEl pipeline de la Copa del Mundo ha fallado en la ejecución diaria.\n• **Entorno:** GitHub Actions\n• **Estado:** Error crítico detectado.\n\nPor favor, ingresa a la pestaña de Actions para revisar los logs."}' \
               ${{ secrets.DISCORD_WEBHOOK }}
